<script type="text/babel" data-presets="react">
const {
  useState,
  useEffect,
  useContext,
  useCallback,
  useMemo,
  useRef,
  createContext,
} = React;

// ==== react-app/src/utils/format.js ====

// Mimics Angular's number pipe: '1.2-2' => min 1 integer digit, 2 to 2 fraction digits
function fmt2(val) {
  const num = typeof val === 'number' ? val : parseFloat(val);
  if (isNaN(num)) return '';
  return num.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).replace(/\u00A0/g, ' ');
}

// '1.2-3' => min 1 integer digit, 2 to 3 fraction digits
function fmt3(val) {
  const num = typeof val === 'number' ? val : parseFloat(val);
  if (isNaN(num)) return '';
  return num.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 3 }).replace(/\u00A0/g, ' ');
}

// ==== react-app/src/context/AuthContext.jsx ====

const AuthContext = createContext(null);

const STORAGE_KEY_USER = 'app_user';
const STORAGE_KEY_ADMIN_DB = 'app_admins_db';
const STORAGE_KEY_MASTER_CODE = 'app_master_code_v1';

function loadInitialUser() {
  const saved = localStorage.getItem(STORAGE_KEY_USER);
  return saved ? JSON.parse(saved) : null;
}

function AuthProvider({ children }) {
  const [currentUser, setCurrentUser] = useState(loadInitialUser);

  const isAdmin = useCallback(() => currentUser?.role === 'admin', [currentUser]);

  const getMasterCode = useCallback(() => {
    return localStorage.getItem(STORAGE_KEY_MASTER_CODE) || '0000';
  }, []);

  const setMasterCode = useCallback((newCode) => {
    localStorage.setItem(STORAGE_KEY_MASTER_CODE, newCode);
  }, []);

  const persistUser = (user) => {
    setCurrentUser(user);
    localStorage.setItem(STORAGE_KEY_USER, JSON.stringify(user));
  };

  const loginAdmin = useCallback((email, pass) => {
    if (!email || !pass) return false;
    const usersStr = localStorage.getItem(STORAGE_KEY_ADMIN_DB);
    const users = usersStr ? JSON.parse(usersStr) : [];
    const found = users.find(
      (u) => u.email?.toLowerCase() === email.toLowerCase() && u.password === pass
    );
    if (found) {
      const { password, ...safeUser } = found;
      persistUser(safeUser);
      return true;
    }
    return false;
  }, []);

  const signupAdmin = useCallback((name, email, pass) => {
    if (!name || !email || !pass) return false;
    const usersStr = localStorage.getItem(STORAGE_KEY_ADMIN_DB);
    const users = usersStr ? JSON.parse(usersStr) : [];
    if (users.some((u) => u.email?.toLowerCase() === email.toLowerCase())) {
      return false;
    }
    const newUser = {
      id: Math.random().toString(36).substr(2, 9),
      name,
      email,
      role: 'admin',
      password: pass,
    };
    users.push(newUser);
    localStorage.setItem(STORAGE_KEY_ADMIN_DB, JSON.stringify(users));
    const { password, ...safeUser } = newUser;
    persistUser(safeUser);
    return true;
  }, []);

  const loginAsEmployee = useCallback((name, matricule) => {
    const user = {
      id: 'emp_' + Math.random().toString(36).substr(2, 9),
      name,
      identifier: matricule || name,
      role: 'employee',
    };
    persistUser(user);
  }, []);

  const logout = useCallback(() => {
    setCurrentUser(null);
    localStorage.removeItem(STORAGE_KEY_USER);
  }, []);

  const value = {
    currentUser,
    isAdmin,
    getMasterCode,
    setMasterCode,
    loginAdmin,
    signupAdmin,
    loginAsEmployee,
    logout,
  };

  return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
}

function useAuth() {
  const ctx = useContext(AuthContext);
  if (!ctx) throw new Error('useAuth must be used within AuthProvider');
  return ctx;
}

// ==== react-app/src/context/PayslipContext.jsx ====

const PayslipContext = createContext(null);

const STORAGE_KEY_DB = 'payslip_db_v1';
const STORAGE_KEY_COMPANY = 'payslip_company_v15_empty_default';

function safeFloat(val) {
  if (val === null || val === undefined || val === '') return 0;
  if (typeof val === 'number') return val;
  const str = String(val).replace(',', '.').replace(/\s/g, '');
  const num = parseFloat(str);
  return isNaN(num) ? 0 : num;
}

function getEmptyEmployee() {
  return {
    matricule: '',
    accessCode: '',
    nomPrenom: '',
    dateNaissance: '',
    situationFamiliale: 'Célibataire',
    nombreEnfants: 0,
    fonction: '',
    dateEmbauche: '',
    cnss: '',
    mutuelle: '',
    cimr: '',
    cin: '',
    compteBancaire: '',
  };
}

function getDefaultRubriques() {
  return [
    { id: '1', code: '0307', designation: 'Salaire horaire', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: true },
    { id: '2', code: '0406', designation: 'Heures sup à 25 %', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: true },
    { id: '3', code: '0407', designation: 'Heures sup à 50 %', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: true },
    { id: '4', code: '0408', designation: 'Heures sup à 100%', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: true },
    { id: '5', code: '0711', designation: 'Indemnité de salissure', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: false },
    { id: '6', code: '0713', designation: 'Prime de panier', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: false },
    { id: '7', code: '0808', designation: 'Prime de production', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: false },
    { id: '8', code: '0902', designation: 'Prime ancienneté', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: false },
    { id: '9', code: '1000', designation: 'Salaire brut', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: false },
    { id: '10', code: '1208', designation: 'Cotisation Cnss salariale', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: false },
    { id: '11', code: '1303', designation: 'Cotisation mutuelle salar', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: false },
    { id: '12', code: '1800', designation: 'Avance salaire', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: false },
    { id: '13', code: '4002', designation: 'Net à payer', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: false },
    { id: '14', code: '4003', designation: 'Arrond à reporter', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: false },
  ];
}

const defaultCompany = {
  nom: 'علف المغرب',
  adresse: 'Zone Industrielle Agropolis, Meknès',
  idFisc: 'CNSS: 1554452 / IF: 12345678',
  periode: '',
};

const defaultWorkInfo = {
  joursTravailles: 0,
  heuresTravailles: 0,
  soldeCongeM1: 0,
  congesAcquis: 0,
  congesPris: 0,
  salaireBrutImposable: 0,
  autreRetenue: 0,
};

function PayslipProvider({ children }) {
  const [isSaving, setIsSaving] = useState(false);
  const [isPrintPreview, setIsPrintPreview] = useState(false);

  const [company, setCompany] = useState(() => {
    const saved = localStorage.getItem(STORAGE_KEY_COMPANY);
    return saved ? JSON.parse(saved) : defaultCompany;
  });

  const [savedRecords, setSavedRecords] = useState(() => {
    const saved = localStorage.getItem(STORAGE_KEY_DB);
    return saved ? JSON.parse(saved) : [];
  });

  const [currentRecordId, setCurrentRecordId] = useState(null);
  const [employee, setEmployee] = useState(getEmptyEmployee);
  const [rubriques, setRubriques] = useState(getDefaultRubriques);
  const [workInfo, setWorkInfo] = useState(defaultWorkInfo);
  const [modePaiement, setModePaiement] = useState('Virement');
  const [montantLettres, setMontantLettres] = useState('');

  const saveTimeout = useRef(null);

  // Keep refs in sync so saveCurrentRecord can always read the latest values
  // without depending on stale closures or complex nested setState chains.
  const employeeRef = useRef(employee);
  const rubriquesRef = useRef(rubriques);
  const workInfoRef = useRef(workInfo);
  const modePaiementRef = useRef(modePaiement);
  const montantLettresRef = useRef(montantLettres);
  const currentRecordIdRef = useRef(currentRecordId);

  useEffect(() => { employeeRef.current = employee; }, [employee]);
  useEffect(() => { rubriquesRef.current = rubriques; }, [rubriques]);
  useEffect(() => { workInfoRef.current = workInfo; }, [workInfo]);
  useEffect(() => { modePaiementRef.current = modePaiement; }, [modePaiement]);
  useEffect(() => { montantLettresRef.current = montantLettres; }, [montantLettres]);
  useEffect(() => { currentRecordIdRef.current = currentRecordId; }, [currentRecordId]);

  // Persist company on change
  useEffect(() => {
    localStorage.setItem(STORAGE_KEY_COMPANY, JSON.stringify(company));
  }, [company]);

  // --- Computeds ---
  const totalGains = useMemo(() => rubriques.reduce((acc, r) => acc + safeFloat(r.gain), 0), [rubriques]);
  const totalRetenues = useMemo(() => rubriques.reduce((acc, r) => acc + safeFloat(r.retenue), 0), [rubriques]);

  const netAPayer = useMemo(() => {
    const basicNet = totalGains - totalRetenues;
    const manualDeduction = safeFloat(workInfo.autreRetenue);
    return basicNet - manualDeduction;
  }, [totalGains, totalRetenues, workInfo]);

  const soldeCongeM = useMemo(
    () => safeFloat(workInfo.soldeCongeM1) + safeFloat(workInfo.congesAcquis) - safeFloat(workInfo.congesPris),
    [workInfo]
  );

  const findRetenue = (code1, code2) => rubriques.find((r) => r.code === code1 || (code2 && r.code === code2))?.retenue || 0;

  const cotisationCNSS = useMemo(() => findRetenue('1208', '300'), [rubriques]);
  const cotisationMutuelle = useMemo(() => findRetenue('1303', '301'), [rubriques]);
  const cotisationCIMR = useMemo(() => findRetenue('302'), [rubriques]);
  const cotisationAMO = useMemo(() => findRetenue('1209', '304'), [rubriques]);
  const retenueIR = useMemo(() => findRetenue('303'), [rubriques]);

  const salaireBrut = useMemo(
    () => rubriques.find((r) => r.code === '1000')?.gain || totalGains,
    [rubriques, totalGains]
  );

  const salaireBrutImposableDisplay = useMemo(() => {
    const override = safeFloat(workInfo.salaireBrutImposable);
    return override > 0 ? override : salaireBrut;
  }, [workInfo, salaireBrut]);

  const persistDb = useCallback((records) => {
    localStorage.setItem(STORAGE_KEY_DB, JSON.stringify(records));
  }, []);

  const saveCurrentRecord = useCallback(() => {
    const id = currentRecordIdRef.current || Math.random().toString(36).substr(2, 9);
    if (!currentRecordIdRef.current) {
      currentRecordIdRef.current = id;
      setCurrentRecordId(id);
    }

    const record = {
      id,
      employee: employeeRef.current,
      rubriques: rubriquesRef.current,
      workInfo: workInfoRef.current,
      modePaiement: modePaiementRef.current,
      montantLettres: montantLettresRef.current,
      lastModified: Date.now(),
    };

    setSavedRecords((records) => {
      const index = records.findIndex((r) => r.id === record.id);
      let updated;
      if (index >= 0) {
        updated = [...records];
        updated[index] = record;
      } else {
        updated = [...records, record];
      }
      persistDb(updated);
      return updated;
    });
  }, [persistDb]);

  const triggerAutoSave = useCallback(() => {
    setIsSaving(true);
    clearTimeout(saveTimeout.current);
    saveTimeout.current = setTimeout(() => {
      saveCurrentRecord();
      setIsSaving(false);
    }, 1000);
  }, [saveCurrentRecord]);

  // Auto-save whenever editable state changes, once a record is being edited
  const isMounted = useRef(false);
  useEffect(() => {
    if (!isMounted.current) {
      isMounted.current = true;
      return;
    }
    if (currentRecordId) {
      triggerAutoSave();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [employee, rubriques, workInfo, modePaiement, montantLettres]);

  const authenticateEmployee = useCallback(
    (matricule, code) => {
      if (!matricule || !code) return null;
      const matClean = matricule.toLowerCase().trim();
      const codeClean = code.trim();
      return (
        savedRecords.find((r) => {
          const rMat = (r.employee.matricule || '').toLowerCase().trim();
          const rCode = (r.employee.accessCode || '').trim();
          return rMat === matClean && rCode === codeClean;
        }) || null
      );
    },
    [savedRecords]
  );

  const updateSpecificRetenue = useCallback((code, designation, val) => {
    const amount = safeFloat(val);
    setRubriques((items) => {
      const existing = items.find((r) => r.code === code);
      if (existing) {
        return items.map((r) => (r.code === code ? { ...r, retenue: amount } : r));
      } else {
        if (amount === 0) return items;
        return [
          ...items,
          {
            id: Math.random().toString(36).substr(2, 9),
            code,
            designation,
            base: 0,
            taux: 0,
            gain: 0,
            retenue: amount,
            isAuto: false,
          },
        ];
      }
    });
  }, []);

  const setCotisationMutuelle = (val) => updateSpecificRetenue('1303', 'Cotisation mutuelle salar', val);
  const setCotisationCIMR = (val) => updateSpecificRetenue('302', 'Cotisation CIMR', val);
  const setCotisationAMO = (val) => updateSpecificRetenue('1209', 'Cotisation AMO', val);
  const setRetenueIR = (val) => updateSpecificRetenue('303', 'Retenue I.R.', val);

  const deleteRecord = useCallback(
    (id) => {
      setSavedRecords((records) => {
        const updated = records.filter((r) => r.id !== id);
        persistDb(updated);
        return updated;
      });
      setCurrentRecordId((prev) => (prev === id ? null : prev));
    },
    [persistDb]
  );

  const loadRecord = useCallback(
    (id) => {
      const record = savedRecords.find((r) => r.id === id);
      if (record) {
        setCurrentRecordId(record.id);
        setEmployee(JSON.parse(JSON.stringify(record.employee)));
        setRubriques(JSON.parse(JSON.stringify(record.rubriques)));
        setWorkInfo(JSON.parse(JSON.stringify(record.workInfo)));
        setModePaiement(record.modePaiement);
        setMontantLettres(record.montantLettres);
      }
    },
    [savedRecords]
  );

  const createNewEmployee = useCallback(() => {
    const newId = Math.random().toString(36).substr(2, 9);
    const emptyEmployee = getEmptyEmployee();
    const defaultRubriques = getDefaultRubriques();
    const initialWorkInfo = { joursTravailles: 0, heuresTravailles: 0, soldeCongeM1: 0, congesAcquis: 0, congesPris: 0, salaireBrutImposable: 0, autreRetenue: 0 };

    currentRecordIdRef.current = newId;
    employeeRef.current = emptyEmployee;
    rubriquesRef.current = defaultRubriques;
    workInfoRef.current = initialWorkInfo;
    modePaiementRef.current = 'Virement';
    montantLettresRef.current = '';

    setCurrentRecordId(newId);
    setEmployee(emptyEmployee);
    setRubriques(defaultRubriques);
    setWorkInfo(initialWorkInfo);
    setModePaiement('Virement');
    setMontantLettres('');

    const record = {
      id: newId,
      employee: emptyEmployee,
      rubriques: defaultRubriques,
      workInfo: initialWorkInfo,
      modePaiement: 'Virement',
      montantLettres: '',
      lastModified: Date.now(),
    };
    setSavedRecords((records) => {
      const updated = [...records, record];
      persistDb(updated);
      return updated;
    });
  }, [persistDb]);

  const updateCompany = (val) => setCompany((c) => ({ ...c, ...val }));
  const updateEmployee = (val) => setEmployee((e) => ({ ...e, ...val }));
  const updateWorkInfo = (val) => setWorkInfo((w) => ({ ...w, ...val }));

  const updateRubrique = useCallback((id, val) => {
    setRubriques((items) => {
      const itemsAfterInput = items.map((item) => (item.id === id ? { ...item, ...val } : item));

      const refItem = itemsAfterInput.find((i) => i.code === '0307');
      const baseHourlyRate = refItem ? safeFloat(refItem.taux) : 0;

      return itemsAfterInput.map((item) => {
        if (!item.isAuto) return item;

        let currentBase = safeFloat(item.base);
        let currentTaux = safeFloat(item.taux);

        if (refItem && item.id !== refItem.id) {
          const cod = item.code;
          if (cod === '0406') currentTaux = baseHourlyRate * 1.25;
          else if (cod === '0407') currentTaux = baseHourlyRate * 1.5;
          else if (cod === '0408') currentTaux = baseHourlyRate * 2.0;
        }

        let newGain = item.gain;
        if (currentBase > 0 || currentTaux > 0) {
          const calculated = currentBase * currentTaux;
          newGain = Math.round(calculated * 100) / 100;
        }

        return { ...item, base: currentBase, taux: currentTaux, gain: newGain };
      });
    });
  }, []);

  const toggleRubriqueAuto = useCallback(
    (id) => {
      setRubriques((items) => items.map((item) => (item.id === id ? { ...item, isAuto: !item.isAuto } : item)));
      updateRubrique(id, {});
    },
    [updateRubrique]
  );

  const addRubrique = () =>
    setRubriques((items) => [
      ...items,
      { id: Math.random().toString(36).substr(2, 9), code: '', designation: '', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: false },
    ]);

  const removeRubrique = (id) => setRubriques((items) => items.filter((i) => i.id !== id));

  const value = {
    isSaving,
    isPrintPreview,
    setIsPrintPreview,
    company,
    updateCompany,
    savedRecords,
    currentRecordId,
    employee,
    updateEmployee,
    rubriques,
    workInfo,
    updateWorkInfo,
    modePaiement,
    setModePaiement,
    montantLettres,
    setMontantLettres,
    totalGains,
    totalRetenues,
    netAPayer,
    soldeCongeM,
    cotisationCNSS,
    cotisationMutuelle,
    cotisationCIMR,
    cotisationAMO,
    retenueIR,
    salaireBrut,
    salaireBrutImposableDisplay,
    authenticateEmployee,
    setCotisationMutuelle,
    setCotisationCIMR,
    setCotisationAMO,
    setRetenueIR,
    saveCurrentRecord,
    deleteRecord,
    loadRecord,
    createNewEmployee,
    updateRubrique,
    toggleRubriqueAuto,
    addRubrique,
    removeRubrique,
  };

  return <PayslipContext.Provider value={value}>{children}</PayslipContext.Provider>;
}

function usePayslip() {
  const ctx = useContext(PayslipContext);
  if (!ctx) throw new Error('usePayslip must be used within PayslipProvider');
  return ctx;
}

function Auth() {
  const auth = useAuth();
  const payslipService = usePayslip();

  const [selectedRole, setSelectedRole] = useState('employee');
  const [isAdminLoginMode, setIsAdminLoginMode] = useState(true);
  const [errorMessage, setErrorMessage] = useState(null);

  const [empMatricule, setEmpMatricule] = useState('');
  const [empCode, setEmpCode] = useState('');

  const [adminName, setAdminName] = useState('');
  const [adminEmail, setAdminEmail] = useState('');
  const [adminPass, setAdminPass] = useState('');
  const [adminCode, setAdminCode] = useState('');

  const switchRole = (role) => {
    setSelectedRole(role);
    setErrorMessage(null);
  };

  const loginEmployee = (e) => {
    e.preventDefault();
    setErrorMessage(null);
    if (!empMatricule || !empCode) {
      setErrorMessage('Veuillez entrer votre matricule et code.');
      return;
    }
    const record = payslipService.authenticateEmployee(empMatricule, empCode);
    if (record) {
      auth.loginAsEmployee(record.employee.nomPrenom, record.employee.matricule);
    } else {
      setErrorMessage('Identifiants incorrects.');
    }
  };

  const submitAdmin = (e) => {
    e.preventDefault();
    setErrorMessage(null);

    if (isAdminLoginMode) {
      const success = auth.loginAdmin(adminEmail, adminPass);
      if (!success) setErrorMessage('Email ou mot de passe incorrect.');
    } else {
      if (adminCode !== auth.getMasterCode()) {
        setErrorMessage('Code secret incorrect.');
        return;
      }
      const success = auth.signupAdmin(adminName, adminEmail, adminPass);
      if (!success) setErrorMessage('Cet email est déjà utilisé.');
    }
  };

  return (
    <div
      className="min-h-screen flex items-center justify-center bg-gray-50 px-4"
      style={{ backgroundImage: 'radial-gradient(#e5e7eb 1px, transparent 1px)', backgroundSize: '20px 20px' }}

          <div className="flex justify-center mb-4">
            <div className="flex items-end scale-90">
              <div className="flex flex-col items-center">
                <div
                  dir="rtl"
                  className="bg-[#bf0010] text-white min-w-[10rem] px-4 w-auto h-10 flex items-center justify-center font-bold text-2xl whitespace-nowrap"
                  style={{ fontFamily: 'Arial, sans-serif' }}
                >
                  {payslipService.company.nom}
                </div>
                <div
                  dir="rtl"
                  className="text-[10px] uppercase tracking-wide mt-1 font-sans text-gray-800 font-bold border-t border-gray-300 w-full text-center pt-1"
                >
                  أعلاف المواشي والدواجن
                </div>
              </div>
              <div className="w-24 h-14 relative -mr-[1px] mb-[18px]" style={{ transform: 'scaleX(-1)' }}>
                <svg viewBox="0 0 140 70" className="h-full w-full">
                  <path d="M0,70 L0,30 L46,30 L46,15 L92,15 L92,0 L140,0 L140,70 Z" fill="#007A33" />
                  <g transform="translate(5, 40) scale(-0.10, 0.10) translate(-140, 0)">
                    <path
                      fill="white"
                      d="M150,50 c-10,-20 -30,-30 -50,-25 c-10,2 -20,10 -25,20 c-5,-5 -15,-5 -20,0 c-10,10 -5,25 5,30 c-10,20 -10,50 10,70 c20,20 60,20 80,0 c10,-10 20,-30 20,-50 c10,-5 20,-10 25,-20 c5,-10 0,-20 -10,-20 c-10,0 -20,5 -35,15 Z M140,40 l10,-10 l-10,5 Z"
                    />
                  </g>
                </svg>
              </div>
            </div>
          </div>

          <h2 className="text-xl font-bold text-gray-800 mb-1">Portail de Paie</h2>
          <p className="text-xs text-gray-400 uppercase tracking-widest">Version Sécurisée</p>
        </div>

        {/* Role Tabs */}
        <div className="flex border-b border-gray-200">
          <button

            className={

              (selectedRole === 'employee' ? 'border-b-2 border-[#007A33] text-[#007A33] bg-green-50/50' : 'text-gray-500 hover:text-gray-700')
            }

          {selectedRole === 'employee' && (

              </div>

              <form onSubmit={submitAdmin} className="space-y-4 animate-fadeIn">

                    </label>
                    <input

function EmployeeList({ onOpenEmployee, onCreateNew }) {
  const store = usePayslip();
  const auth = useAuth();

  const [searchTerm, setSearchTerm] = useState('');
  const [showSecurityModal, setShowSecurityModal] = useState(false);
  const [newMasterCode, setNewMasterCode] = useState('');

  const filteredRecords = useMemo(() => {
    let records = store.savedRecords;
    const term = searchTerm.toLowerCase();

    if (!auth.isAdmin()) {
      const currentUser = auth.currentUser;
      if (currentUser && currentUser.identifier) {
        const searchId = currentUser.identifier.toLowerCase().trim();
        records = records.filter((r) => {
          const mat = (r.employee.matricule || '').toLowerCase().trim();
          const nom = (r.employee.nomPrenom || '').toLowerCase().trim();
          return mat === searchId || nom === searchId || nom.includes(searchId);
        });
      } else {
        return [];
      }
    }

    if (term) {
      records = records.filter(
        (r) =>
          (r.employee.nomPrenom && r.employee.nomPrenom.toLowerCase().includes(term)) ||
          (r.employee.matricule && r.employee.matricule.toLowerCase().includes(term)) ||
          (r.employee.fonction && r.employee.fonction.toLowerCase().includes(term))
      );
    }

    return records;
  }, [store.savedRecords, searchTerm, auth]);

  const calculateNet = (record) => {
    const gains = record.rubriques.reduce((acc, r) => acc + (parseFloat(r.gain) || 0), 0);
    const retenues = record.rubriques.reduce((acc, r) => acc + (parseFloat(r.retenue) || 0), 0);
    return gains - retenues;
  };

  const deleteEmployee = (id) => {
    if (confirm('Êtes-vous sûr de vouloir supprimer ce dossier ?')) {
      store.deleteRecord(id);
    }
  };

  const saveNewMasterCode = () => {
    if (newMasterCode && newMasterCode.trim().length > 0) {
      auth.setMasterCode(newMasterCode.trim());
      setShowSecurityModal(false);
      setNewMasterCode('');
      alert('Code secret mis à jour.');
    } else {
      alert('Code invalide.');
    }
  };

  return (
    <div className="max-w-[950px] mx-auto p-4">
      {/* Header */}
      <div className="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-sm border border-gray-200 gap-4">
        <div>
          <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
            {auth.isAdmin() ? (
              <>
                <i className="fas fa-building text-[#bf0010]"></i> <span dir="rtl">{store.company.nom}</span>
              </>
            ) : (
              <>
                <i className="fas fa-user-circle text-[#007A33]"></i> Espace Employé
              </>
            )}
          </h2>
          <p className="text-sm text-gray-500">
            {auth.isAdmin() ? (
              <>
                <span className="bg-gray-100 px-2 py-0.5 rounded text-xs border border-gray-300 mr-1">Admin</span>
                Total dossiers : {store.savedRecords.length}
              </>
            ) : (
              <>
                Bonjour <span className="font-bold text-black">{auth.currentUser?.name}</span>.
              </>
            )}
          </p>
        </div>

        <div className="flex gap-2">
          {auth.isAdmin() && (
            <>
              <button
                onClick={() => setShowSecurityModal(true)}
                className="bg-gray-100 text-gray-700 hover:bg-gray-200 px-3 py-2.5 rounded-lg font-bold border border-gray-300 transition flex items-center gap-2 text-xs"
                title="Modifier le code secret master"
              >
                <i className="fas fa-key text-[#bf0010]"></i> Sécurité
              </button>

              <button
                onClick={onCreateNew}
                className="bg-[#bf0010] text-white px-5 py-2.5 rounded-lg font-bold shadow-md hover:bg-[#90000c] transition flex items-center gap-2"
              >
                <i className="fas fa-plus"></i> <span className="hidden sm:inline">Nouveau</span>
              </button>
            </>
          )}
        </div>
      </div>

      {/* Search */}
      <div className="relative mb-4">
        <i className="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input
          value={searchTerm}
          onChange={(e) => setSearchTerm(e.target.value)}
          placeholder={auth.isAdmin() ? 'Rechercher par nom ou matricule...' : 'Filtrer...'}
          className="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#bf0010] outline-none transition"
        />
      </div>

      {/* List */}
      <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        {filteredRecords.length === 0 ? (
          <div className="p-10 text-center text-gray-500">
            {!auth.isAdmin() ? (
              <>
                <div className="mb-4">
                  <span className="bg-gray-100 text-gray-400 w-20 h-20 rounded-full flex items-center justify-center mx-auto text-3xl">
                    <i className="fas fa-file-invoice"></i>
                  </span>
                </div>
                <h3 className="text-lg font-bold text-gray-700">Aucun dossier</h3>
                <p className="text-sm mt-2 max-w-md mx-auto leading-relaxed text-gray-500">
                  Aucun bulletin de paie trouvé pour l'identifiant :
                  <br />
                  <span className="font-bold text-[#bf0010] text-base">"{auth.currentUser?.identifier}"</span>
                </p>
              </>
            ) : (
              <>
                <i className="fas fa-users text-4xl mb-3 opacity-30"></i>
                <p>Base de données vide.</p>
              </>
            )}
          </div>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-left border-collapse">
              <thead>
                <tr className="bg-gray-50 text-gray-600 text-xs uppercase tracking-wider border-b border-gray-200">
                  <th className="p-4 font-semibold">Matricule</th>
                  <th className="p-4 font-semibold">Nom Complet</th>
                  <th className="p-4 font-semibold hidden sm:table-cell">Fonction</th>
                  <th className="p-4 font-semibold text-left">Net à Payer</th>
                  <th className="p-4 font-semibold text-center">Actions</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {filteredRecords.map((record) => (
                  <tr key={record.id} className="hover:bg-gray-50 transition group cursor-pointer" onClick={() => onOpenEmployee(record.id)}>
                    <td className="p-4 font-mono text-sm text-gray-500">{record.employee.matricule || '---'}</td>
                    <td className="p-4 font-bold text-gray-800">
                      {record.employee.nomPrenom}
                      {!auth.isAdmin() && (
                        <span className="ml-2 text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full border border-green-200">Moi</span>
                      )}
                    </td>
                    <td className="p-4 text-sm text-gray-600 hidden sm:table-cell">{record.employee.fonction}</td>
                    <td className="p-4 text-left font-mono font-bold text-[#007A33]" dir="ltr">
                      {fmt2(calculateNet(record))} Dhs
                    </td>
                    <td className="p-4 text-center">
                      <div className="flex justify-center items-center gap-3">
                        <button
                          onClick={(e) => {
                            e.stopPropagation();
                            onOpenEmployee(record.id);
                          }}
                          className={(auth.isAdmin() ? 'text-blue-600 hover:bg-blue-50' : 'text-gray-500 hover:bg-gray-100') + ' p-2 rounded-full transition'}
                          title="Voir"
                        >
                          <i className={'fas ' + (auth.isAdmin() ? 'fa-edit' : 'fa-eye')}></i>
                        </button>

                        {auth.isAdmin() && (
                          <button
                            onClick={(e) => {
                              e.stopPropagation();
                              deleteEmployee(record.id);
                            }}
                            className="text-red-400 hover:text-red-600 p-2 rounded-full hover:bg-red-50 transition"
                            title="Supprimer"
                          >
                            <i className="fas fa-trash-alt"></i>
                          </button>
                        )}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* Security Modal */}
      {showSecurityModal && (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm animate-fadeIn">
            <h3 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
              <i className="fas fa-shield-alt text-[#bf0010]"></i> Sécurité Système
            </h3>

            <p className="text-sm text-gray-600 mb-4">
              Modifier le <strong>Code Secret Master</strong> utilisé pour créer les comptes administrateurs.
            </p>

            <div className="bg-gray-50 p-3 rounded mb-4 border border-gray-200 text-center">
              <span className="text-xs text-gray-500 uppercase block mb-1">Code Actuel</span>
              <strong className="font-mono text-xl tracking-widest">{auth.getMasterCode()}</strong>
            </div>

            <div className="mb-4">
              <label className="block text-xs font-bold text-gray-500 mb-1">Nouveau Code</label>
              <input
                type="text"
                value={newMasterCode}
                onChange={(e) => setNewMasterCode(e.target.value)}
                className="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-[#bf0010] text-center font-bold tracking-widest text-lg"
                placeholder="Ex: 2025"
              />
            </div>

            <div className="flex justify-end gap-2">
              <button onClick={() => setShowSecurityModal(false)} className="px-4 py-2 rounded text-gray-600 hover:bg-gray-100 font-bold text-sm">
                Annuler
              </button>
              <button onClick={saveNewMasterCode} className="px-4 py-2 rounded bg-[#bf0010] hover:bg-[#a00c24] text-white font-bold text-sm shadow">
                Enregistrer
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PayslipEditor() {
  const store = usePayslip();
  const auth = useAuth();

  const [showCodeEdit, setShowCodeEdit] = useState(false);
  const [isGeneratingPdf, setIsGeneratingPdf] = useState(false);

  const isAdmin = auth.isAdmin();

  const openPreview = () => {
    store.saveCurrentRecord();
    store.setIsPrintPreview(true);
    window.scrollTo(0, 0);
  };

  const closePreview = () => {
    store.setIsPrintPreview(false);
  };

  const downloadPdf = async () => {
    if (isGeneratingPdf) return;
    setIsGeneratingPdf(true);

    await new Promise((resolve) => setTimeout(resolve, 50));

    try {
      const html2canvas = window.html2canvas;
      const { jsPDF } = window.jspdf;

      if (!html2canvas || !jsPDF) {
        alert("Outils d'impression non prêts.");
        setIsGeneratingPdf(false);
        return;
      }

      const element = document.querySelector('.print-preview-container .a4-sheet');
      if (!element) throw new Error('Element introuvable');

      const canvas = await html2canvas(element, {
        scale: 2,
        useCORS: true,
        logging: false,
        backgroundColor: '#ffffff',
      });

      const imgData = canvas.toDataURL('image/jpeg', 0.95);

      const pdf = new jsPDF('p', 'mm', 'a4');
      const pdfWidth = pdf.internal.pageSize.getWidth();
      const canvasRatio = canvas.height / canvas.width;
      const printHeight = pdfWidth * canvasRatio;

      pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, printHeight);

      const filename = `Bulletin_${store.employee.nomPrenom || 'Paie'}.pdf`;
      pdf.save(filename);
    } catch (err) {
      console.error(err);
      alert('Erreur lors de la création du PDF.');
    } finally {
      setIsGeneratingPdf(false);
    }
  };

  const readOnlyClass = !isAdmin ? 'read-only-mode' : '';

  return (
    <>
      {/* SECTION 1: EDITOR UI */}

          <button
            onClick={openPreview}
            className="bg-[#bf0010] text-white font-bold py-2 px-6 rounded-lg shadow hover:bg-[#90000c] flex items-center gap-2 transform active:scale-95 transition"
          >
            <i className="fas fa-file-pdf text-xl"></i>
            <span>Télécharger la Version Papier</span>
          </button>
        </div>

        <div className={'bulletin ' + readOnlyClass}>
          {/* Header */}
          <div className="header">
            <div className="flex flex-col">
              <div className="mb-3">
                <div className="flex items-end">
                  <div className="bg-[#bf0010] text-white min-w-[200px] w-auto px-2 h-[45px] flex items-center justify-center relative z-10">
                    <input
                      value={store.company.nom}
                      onChange={(e) => store.updateCompany({ nom: e.target.value })}
                      dir="rtl"
                      readOnly={!isAdmin}
                      className="font-bold text-3xl text-white leading-none bg-transparent w-full min-w-[180px] text-center outline-none border-none placeholder-white/50 pb-2"
                      style={{ fontFamily: 'Arial, sans-serif' }}
                    />
                  </div>
                  <div className="w-[110px] h-[55px] relative -ml-[1px]">
                    <svg viewBox="0 0 140 70" className="h-full w-full" preserveAspectRatio="none">
                      <path d="M140,70 L140,30 L94,30 L94,15 L48,15 L48,0 L0,0 L0,70 Z" fill="#007A33"></path>
                      <g transform="translate(135, 40) scale(0.10, 0.10) translate(-140, 0)">
                        <path
                          fill="white"
                          d="M150,50 c-10,-20 -30,-30 -50,-25 c-10,2 -20,10 -25,20 c-5,-5 -15,-5 -20,0 c-10,10 -5,25 5,30 c-10,20 -10,50 10,70 c20,20 60,20 80,0 c10,-10 20,-30 20,-50 c10,-5 20,-10 25,-20 c5,-10 0,-20 -10,-20 c-10,0 -20,5 -35,15 Z M140,40 l10,-10 l-10,5 Z"
                        ></path>
                      </g>
                      <g transform="translate(90, 25) scale(0.11, 0.11) translate(-90, 0)">
                        <path
                          fill="white"
                          d="M100,20 c-20,0 -40,10 -50,30 c-10,20 -5,40 10,50 c-5,20 -5,40 10,50 c-5,20 -5,40 10,50 c20,15 60,15 80,0 c15,-10 15,-30 10,-50 c15,-10 20,-30 10,-50 c-10,-20 -30,-30 -50,-30 Z M50,50 c-10,10 -10,30 0,40 c10,10 30,0 30,-20 c0,-20 -20,-30 -30,-20 Z M150,50 c-10,-10 -30,0 -30,20 c0,20 20,30 30,20 c10,-10 10,-30 0,-40 Z"

              <tr>
                <th>Jours Trav.</th>
                <th>Salaire Brut</th>
                <th>Brut Imposable</th>
                <th>Cotisation CNSS</th>
                <th>Cotisation AMO</th>
                <th>Total Gains</th>
                <th>Total Retenues</th>
                <th>Net à Payer</th>
              </tr>
              <tr>
                <td>
                  <input
                    type="number"
                    value={store.workInfo.joursTravailles}
                    onChange={(e) => store.updateWorkInfo({ joursTravailles: e.target.value })}
                    readOnly={!isAdmin}
                    placeholder="26"
                  />
                </td>
                <td>
                  <input value={fmt2(store.salaireBrut)} readOnly className="bg-gray-50 text-gray-500" />
                </td>
                <td>
                  <input
                    value={fmt2(store.salaireBrutImposableDisplay)}
                    onChange={(e) => store.updateWorkInfo({ salaireBrutImposable: e.target.value })}
                    readOnly={!isAdmin}
                  />
                </td>
                <td>
                  <input value={fmt2(store.cotisationCNSS)} readOnly className="bg-gray-50 text-gray-500" />
                </td>
                <td>
                  <input value={fmt2(store.cotisationAMO)} onChange={(e) => store.setCotisationAMO(e.target.value)} readOnly={!isAdmin} />
                </td>
                <td>
                  <input value={fmt2(store.totalGains)} readOnly className="bg-gray-50 text-gray-500" />
                </td>
                <td>
                  <input value={fmt2(store.totalRetenues)} readOnly className="bg-gray-50 text-gray-500" />
                </td>
                <td>
                  <input value={fmt2(store.netAPayer)} readOnly className="font-bold text-[#007A33]" />
                </td>
              </tr>
              <tr>
                <th>Cotisation Mutuelle</th>
                <th>Cotisation CIMR</th>
                <th>Retenue IR</th>
                <th></th>
                <th colSpan={4}>Net à Payer</th>
              </tr>
              <tr>
                <td>
                  <input value={fmt2(store.cotisationMutuelle)} onChange={(e) => store.setCotisationMutuelle(e.target.value)} readOnly={!isAdmin} />
                </td>
                <td>
                  <input value={fmt2(store.cotisationCIMR)} onChange={(e) => store.setCotisationCIMR(e.target.value)} readOnly={!isAdmin} />
                </td>
                <td>
                  <input value={fmt2(store.retenueIR)} onChange={(e) => store.setRetenueIR(e.target.value)} readOnly={!isAdmin} />
                </td>
                <td></td>
                <td colSpan={4}>
                  <input value={fmt2(store.netAPayer)} readOnly className="font-bold text-lg text-[#007A33]" />
                </td>
              </tr>
            </tbody>
          </table>

          {/* Congés */}
          <h3 className="mt-4 font-bold text-sm text-gray-700">Congés</h3>
          <table className="conge">
            <tbody>
              <tr>
                <th>Solde congé M-1</th>
                <th>Acquis</th>
                <th>Pris</th>
                <th>Solde congé M</th>
              </tr>
              <tr>
                <td>
                  <input type="number" value={store.workInfo.soldeCongeM1} onChange={(e) => store.updateWorkInfo({ soldeCongeM1: e.target.value })} readOnly={!isAdmin} />
                </td>
                <td>
                  <input
                    type="number"
                    value={store.workInfo.congesAcquis}
                    onChange={(e) => store.updateWorkInfo({ congesAcquis: e.target.value })}
                    readOnly={!isAdmin}
                    placeholder="1.5"
                  />
                </td>
                <td>
                  <input type="number" value={store.workInfo.congesPris} onChange={(e) => store.updateWorkInfo({ congesPris: e.target.value })} readOnly={!isAdmin} />
                </td>
                <td>
                  <input value={fmt2(store.soldeCongeM)} readOnly className="font-bold" />
                </td>
              </tr>
            </tbody>
          </table>

          <div className="footer flex items-center gap-2 mt-6 pt-4 border-t border-gray-300">
            <span className="text-sm">Mode de paiement : </span>
            <select value={store.modePaiement} onChange={(e) => store.setModePaiement(e.target.value)} disabled={!isAdmin} className="border-b border-black font-bold bg-transparent w-32">
              <option value="Virement">Virement</option>
              <option value="Chèque">Chèque</option>
              <option value="Espèces">Espèces</option>
            </select>
            <span className="mr-2"> : </span>
            <input
              value={store.montantLettres}
              onChange={(e) => store.setMontantLettres(e.target.value)}
              readOnly={!isAdmin}
              placeholder="Somme en toutes lettres..."
              className="text-left font-bold italic flex-grow text-sm"
            />
          </div>
        </div>
      </div>

      {/* SECTION 2: PRINT PREVIEW OVERLAY */}
      {store.isPrintPreview && (
        <div className="fixed inset-0 z-[100] bg-gray-900 flex flex-col items-center justify-start overflow-auto p-4 animate-fadeIn print-modal-overlay">
          <div className="w-full max-w-2xl flex justify-between items-center mb-6 text-white sticky top-0 z-50 bg-gray-900/90 backdrop-blur py-2 print-toolbar">
            <button onClick={closePreview} className="px-4 py-2 rounded-full hover:bg-white/10 flex items-center gap-2 text-gray-300 transition">
              <i className="fas fa-arrow-left"></i> Retour
            </button>

            <div className="font-bold flex items-center gap-2">
              <span>Aperçu avant impression</span>
              {isGeneratingPdf && <span className="text-xs bg-yellow-500 text-black px-2 py-0.5 rounded animate-pulse">Génération...</span>}
            </div>

            <button
              onClick={downloadPdf}
              disabled={isGeneratingPdf}
              className="bg-[#bf0010] hover:bg-red-700 text-white font-bold py-2 px-6 rounded-full shadow-lg flex items-center gap-2 transition transform active:scale-95 disabled:opacity-50 disabled:cursor-wait"
            >
              {isGeneratingPdf ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-file-pdf"></i>}
              <span className="hidden sm:inline">Télécharger PDF</span>
            </button>
          </div>

          <div className="bg-white shadow-2xl overflow-hidden print-preview-container" style={{ width: '210mm', minHeight: '297mm', transformOrigin: 'top center' }}>
            <PayslipPreview />
          </div>

          <div className="text-gray-500 text-xs mt-8 mb-4 print-toolbar">Le document sera généré en arabe automatiquement.</div>
        </div>
      )}

      <div className="print-only-section">
        <PayslipPreview />
      </div>
    </>
  );
}

// ==== react-app/src/App.jsx ====

function App() {
  const authService = useAuth();
  const payslipService = usePayslip();

  const [viewMode, setViewMode] = useState('list');
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  const [isAppInstalled, setIsAppInstalled] = useState(false);

  useEffect(() => {
    if (window.matchMedia('(display-mode: standalone)').matches) {
      setIsAppInstalled(true);
    }

    const handler = (e) => {
      e.preventDefault();
      setDeferredPrompt(e);
    };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  const installPwa = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      setDeferredPrompt(null);
    }
  };

  const isEditing = viewMode === 'edit';

  const goBack = () => {
    payslipService.saveCurrentRecord();
    setViewMode('list');
  };

  const openPrintPreview = () => {
    payslipService.saveCurrentRecord();
    payslipService.setIsPrintPreview(true);
    window.scrollTo(0, 0);
  };

  const handleCreateNew = () => {
    payslipService.createNewEmployee();
    setViewMode('edit');
  };

  const handleOpenEmployee = (id) => {
    payslipService.loadRecord(id);
    setViewMode('edit');
  };

  if (!authService.currentUser) {
    return <Auth />;
  }

  return (
    <>
      {/* Navbar */}
      <div className="bg-[#333] text-white p-3 shadow-md print:hidden sticky top-0 z-50">
        <div className="w-full max-w-[950px] mx-auto flex justify-between items-center">
          <div className="flex items-center gap-4">
            {isEditing && (
              <>
                {payslipService.isPrintPreview ? (
                  <button onClick={() => payslipService.setIsPrintPreview(false)} className="text-gray-300 hover:text-white transition">
                    <i className="fas fa-arrow-left mr-1"></i> Modifier
                  </button>
                ) : (
                  <button onClick={goBack} className="text-gray-300 hover:text-white transition">
                    <i className="fas fa-arrow-left mr-1"></i> <span className="hidden sm:inline">Liste</span>
                  </button>
                )}
              </>
            )}

            <div className="font-bold text-lg tracking-wider flex items-center gap-2">
              <i className="fas fa-file-invoice-dollar text-[#bf0010]"></i>
              <span className="hidden sm:inline">MAHD PAIE</span>
            </div>
          </div>

          <div className="flex items-center gap-2 sm:gap-3">
            {deferredPrompt && !isAppInstalled && (
              <button
                onClick={installPwa}
                className="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded-full text-xs font-bold border border-gray-500 flex items-center gap-2 transition animate-pulse"
              >
                <i className="fas fa-download"></i> <span className="hidden sm:inline">Installer App</span>
              </button>
            )}

            {isEditing && !payslipService.isPrintPreview && (
              <>
                <button
                  onClick={openPrintPreview}
                  className="bg-[#bf0010] hover:bg-[#a00c24] text-white px-4 py-2 rounded shadow-lg flex items-center gap-2 transition-all transform active:scale-95 ml-2 border border-red-800"
                >
                  <i className="fas fa-file-pdf text-lg"></i>
                  <span className="hidden sm:inline font-bold text-sm">Imprimer PDF</span>
                </button>

                <div className="hidden sm:flex text-[10px] sm:text-xs font-medium px-2 py-1 rounded bg-black/30 items-center gap-1.5 transition-all">
                  {payslipService.isSaving ? (
                    <>
                      <span className="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></span>
                      <span className="text-yellow-100">Sauvegarde...</span>
                    </>
                  ) : (
                    <>
                      <span className="w-2 h-2 rounded-full bg-green-500"></span>
                      <span className="text-green-100">Enregistré</span>
                    </>
                  )}
                </div>
              </>
            )}

            <span className="text-xs sm:text-sm text-gray-300 flex items-center border-l border-gray-600 pl-3 ml-1">
              <i className="fas fa-user sm:mr-2 mr-1"></i>
              <span className="hidden sm:inline">{authService.currentUser?.name}</span>
            </span>

            <button onClick={authService.logout} className="text-white/80 hover:text-red-400 p-1 ml-2" title="Déconnexion">
              <i className="fas fa-power-off"></i>
            </button>
          </div>
        </div>
      </div>

      {/* Main Content */}
      <div className="min-h-screen bg-[#f3f4f6] py-4 sm:py-8 print:bg-white print:p-0">
        {isEditing ? <PayslipEditor /> : <EmployeeList onOpenEmployee={handleOpenEmployee} onCreateNew={handleCreateNew} />}
      </div>
    </>
  );
}

function Root() {
  return (
    <AuthProvider>
      <PayslipProvider>
        <App />
      </PayslipProvider>
    </AuthProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);
</script>
</body>
</html>
